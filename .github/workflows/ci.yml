name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Dummy values — build only needs the vars to exist, no live calls happen
          NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run lint

  rls:
    # RLS policy tests against a local Supabase stack. Boots Postgres + applies
    # schema.sql + all migrations, then asserts the role access matrix
    # (technician cannot read xero_tokens / financial tables; office/admin can).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: npm ci
      - name: Start Supabase (applies schema.sql + migrations)
        run: supabase start -x studio,imgproxy,inbucket,edge-runtime,realtime,vector,logflare
      - name: Run RLS tests
        run: |
          export SUPABASE_TEST_URL="$(supabase status -o env | grep API_URL | cut -d= -f2 | tr -d '\"')"
          export SUPABASE_TEST_ANON_KEY="$(supabase status -o env | grep ANON_KEY | cut -d= -f2 | tr -d '\"')"
          export SUPABASE_TEST_SERVICE_ROLE_KEY="$(supabase status -o env | grep SERVICE_ROLE_KEY | cut -d= -f2 | tr -d '\"')"
          npm run test:rls

  e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Start Supabase
        run: supabase start -x studio,imgproxy,inbucket,edge-runtime,realtime,vector,logflare
      - name: Build + run E2E smoke
        run: |
          export NEXT_PUBLIC_SUPABASE_URL="$(supabase status -o env | grep API_URL | cut -d= -f2 | tr -d '\"')"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="$(supabase status -o env | grep ANON_KEY | cut -d= -f2 | tr -d '\"')"
          export SUPABASE_SERVICE_ROLE_KEY="$(supabase status -o env | grep SERVICE_ROLE_KEY | cut -d= -f2 | tr -d '\"')"
          npm run build
          npm run test:e2e
